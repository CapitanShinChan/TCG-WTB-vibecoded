<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Card Inventory{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/">🃏 Card Inventory</a>
    <nav>
      <a href="/">Search</a>
      <a href="/buylist">Buylist</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- shared recent-sales modal (used by the buylist suggested price) -->
  <div id="sales-modal" class="modal hidden">
    <div class="modal-box">
      <button class="modal-close" data-close-sales>&times;</button>
      <h2 id="sales-modal-title"></h2>
      <div id="sales-modal-body"></div>
    </div>
  </div>

  {% block scripts %}{% endblock %}
  <script src="/static/buylist.js"></script>
</body>
</html>
